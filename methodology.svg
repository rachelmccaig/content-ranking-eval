<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Content ranking evaluation methodology</title>
  <desc id="desc">Hacker News stories flow through an LLM judge and quality rubric, producing a composite score that is compared with engagement ranking using Spearman correlation. Disagreements feed failure analysis.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.4; rx: 10; }
      .title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .text { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .arrow { stroke: #2563eb; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); }
      .accent { fill: #eff6ff; stroke: #2563eb; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="360" rx="18"/>

  <rect class="box accent" x="38" y="70" width="145" height="82"/>
  <text class="title" x="110.5" y="104" text-anchor="middle">Hacker News</text>
  <text class="text" x="110.5" y="129" text-anchor="middle">stories + metadata</text>

  <rect class="box" x="238" y="70" width="145" height="82"/>
  <text class="title" x="310.5" y="104" text-anchor="middle">LLM Judge</text>
  <text class="text" x="310.5" y="129" text-anchor="middle">scores each story</text>

  <rect class="box" x="438" y="45" width="150" height="132"/>
  <text class="title" x="513" y="80" text-anchor="middle">Quality Rubric</text>
  <text class="text" x="513" y="106" text-anchor="middle">clarity</text>
  <text class="text" x="513" y="126" text-anchor="middle">specificity</text>
  <text class="text" x="513" y="146" text-anchor="middle">novelty + density</text>

  <rect class="box" x="643" y="70" width="145" height="82"/>
  <text class="title" x="715.5" y="104" text-anchor="middle">Composite</text>
  <text class="text" x="715.5" y="129" text-anchor="middle">quality score</text>

  <rect class="box accent" x="838" y="70" width="145" height="82"/>
  <text class="title" x="910.5" y="104" text-anchor="middle">Engagement</text>
  <text class="text" x="910.5" y="129" text-anchor="middle">upvotes + comments</text>

  <rect class="box" x="242" y="238" width="190" height="82"/>
  <text class="title" x="337" y="272" text-anchor="middle">Rank Correlation</text>
  <text class="text" x="337" y="297" text-anchor="middle">Spearman agreement</text>

  <rect class="box" x="550" y="238" width="190" height="82"/>
  <text class="title" x="645" y="272" text-anchor="middle">Failure Analysis</text>
  <text class="text" x="645" y="297" text-anchor="middle">where signals diverge</text>

  <path class="arrow" d="M183 111 H230"/>
  <path class="arrow" d="M383 111 H430"/>
  <path class="arrow" d="M588 111 H635"/>
  <path class="arrow" d="M788 111 H830"/>
  <path class="arrow" d="M715 152 C715 206 430 190 370 235"/>
  <path class="arrow" d="M910 152 C910 226 450 194 382 238"/>
  <path class="arrow" d="M432 279 H542"/>
</svg>
